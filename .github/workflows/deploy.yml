# CI en PR/push + CD: build imagen → Amazon ECR → deploy contenedor en EC2.
# En el EC2: red Docker compartida + Postgres local (sin RDS). Auth a ECR por IAM Role.
name: Backend CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: phoenix-orders-backend

jobs:
  ci:
    name: CI (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Tests
        run: npm run test --if-present

      - name: Auditoría de seguridad (no bloqueante)
        run: npm audit --omit=dev || true

      - name: Build
        run: npm run build

  docker:
    name: Build & push imagen (Amazon ECR)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tag de imagen (SHA corto)
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: CD (Postgres + API en EC2)
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      # AWS_REGION y ECR_REPOSITORY se heredan del env global del workflow.
      IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
    steps:
      - name: Deploy por SSH (login ECR, Postgres, API)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REPOSITORY,IMAGE_TAG,DB_PORT,DB_USER,DB_PASSWORD,DB_NAME,CORS_ORIGIN
          script: |
            set -euo pipefail

            if [ -z "${IMAGE_TAG}" ]; then
              echo "ERROR: IMAGE_TAG vacío"
              exit 1
            fi

            # La EC2 tiene un IAM Role con lectura a ECR: no hay claves en el server.
            ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
            REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            IMAGE="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
            echo "Desplegando imagen: ${IMAGE}"

            aws ecr get-login-password --region "${AWS_REGION}" \
              | docker login --username AWS --password-stdin "${REGISTRY}"

            # Red Docker COMPARTIDA con el frontend (nginx la usa para llegar a 'backend').
            docker network create web 2>/dev/null || true

            # Postgres en el mismo EC2 (persistente). Hostname para el API: phoenix-db
            if docker ps -a --format '{{.Names}}' | grep -qx 'phoenix-db'; then
              docker start phoenix-db 2>/dev/null || true
            else
              docker run -d \
                --name phoenix-db \
                --network web \
                --restart unless-stopped \
                -e POSTGRES_USER="$DB_USER" \
                -e POSTGRES_PASSWORD="$DB_PASSWORD" \
                -e POSTGRES_DB="$DB_NAME" \
                -v phoenix-pgdata:/var/lib/postgresql/data \
                postgres:16-alpine
            fi

            echo "Esperando Postgres..."
            for i in $(seq 1 30); do
              if docker exec phoenix-db pg_isready -U "$DB_USER" -d "$DB_NAME" >/dev/null 2>&1; then
                echo "Postgres listo."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Postgres no respondió a tiempo"
                docker logs phoenix-db --tail 50 || true
                exit 1
              fi
              sleep 2
            done

            docker pull "$IMAGE"

            docker stop backend 2>/dev/null || true
            docker rm backend 2>/dev/null || true

            # Contenedor 'backend' en la red 'web', puerto 3000 INTERNO (sin -p):
            # el nginx del frontend lo alcanza como http://backend:3000. No se
            # publica al host. DB_HOST = nombre del contenedor de Postgres.
            docker run -d \
              --name backend \
              --network web \
              --restart unless-stopped \
              -e DB_HOST=phoenix-db \
              -e DB_PORT="${DB_PORT:-5432}" \
              -e DB_USER="$DB_USER" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e DB_NAME="$DB_NAME" \
              -e DB_SSL=false \
              -e PORT=3000 \
              -e NODE_ENV=production \
              -e CORS_ORIGIN="$CORS_ORIGIN" \
              "$IMAGE"

            docker image prune -f
