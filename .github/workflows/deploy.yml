# CI en PR/push + CD: build imagen → Docker Hub → deploy contenedor en EC2.
# En el EC2: red Docker compartida + Postgres local (sin RDS).
name: Backend CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  IMAGE_NAME: phoenix-backend

jobs:
  ci:
    name: CI (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Tests
        run: npm run test --if-present

      - name: Auditoría de seguridad (no bloqueante)
        run: npm audit --omit=dev || true

      - name: Build
        run: npm run build

  docker:
    name: Build & push imagen (Docker Hub)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tags de imagen
        id: meta
        run: |
          TAG="${GITHUB_SHA::7}"
          REF="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.ref }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.ref }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: CD (Postgres + API en EC2)
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy por SSH (red Docker, Postgres, API)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_REF,IMAGE_TAG,DB_PORT,DB_USER,DB_PASSWORD,DB_NAME,CORS_ORIGIN
          script: |
            set -euo pipefail

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            docker network create phoenix-net 2>/dev/null || true

            # Postgres en el mismo EC2 (persistente). Hostname para el API: phoenix-db
            if docker ps -a --format '{{.Names}}' | grep -qx 'phoenix-db'; then
              docker start phoenix-db 2>/dev/null || true
            else
              docker run -d \
                --name phoenix-db \
                --network phoenix-net \
                --restart unless-stopped \
                -e POSTGRES_USER="$DB_USER" \
                -e POSTGRES_PASSWORD="$DB_PASSWORD" \
                -e POSTGRES_DB="$DB_NAME" \
                -v phoenix-pgdata:/var/lib/postgresql/data \
                postgres:16-alpine
            fi

            echo "Esperando Postgres..."
            for i in $(seq 1 30); do
              if docker exec phoenix-db pg_isready -U "$DB_USER" -d "$DB_NAME" >/dev/null 2>&1; then
                echo "Postgres listo."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Postgres no respondió a tiempo"
                docker logs phoenix-db --tail 50 || true
                exit 1
              fi
              sleep 2
            done

            docker pull "${IMAGE_REF}:${IMAGE_TAG}"

            docker stop phoenix-backend 2>/dev/null || true
            docker rm phoenix-backend 2>/dev/null || true

            # DB_HOST fijo: nombre del contenedor en phoenix-net. Sin SSL (no es RDS).
            docker run -d \
              --name phoenix-backend \
              --network phoenix-net \
              --restart unless-stopped \
              -p 3000:3000 \
              -e DB_HOST=phoenix-db \
              -e DB_PORT="${DB_PORT:-5432}" \
              -e DB_USER="$DB_USER" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e DB_NAME="$DB_NAME" \
              -e DB_SSL=false \
              -e PORT=3000 \
              -e NODE_ENV=production \
              -e CORS_ORIGIN="$CORS_ORIGIN" \
              "${IMAGE_REF}:${IMAGE_TAG}"

            docker image prune -f
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_REF: ${{ needs.docker.outputs.image_ref }}
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
