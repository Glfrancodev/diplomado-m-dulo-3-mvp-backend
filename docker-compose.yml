services:
  db:
    image: postgres:16-alpine
    container_name: phoenix_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-phoenix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-phoenix}
      POSTGRES_DB: ${DB_NAME:-phoenix_orders}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-phoenix} -d ${DB_NAME:-phoenix_orders}']
      interval: 5s
      timeout: 5s
      retries: 10
    # Hardening de runtime: sin escalada de privilegios.
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phoenix_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-phoenix}
      DB_PASSWORD: ${DB_PASSWORD:-phoenix}
      DB_NAME: ${DB_NAME:-phoenix_orders}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      NODE_ENV: production
    ports:
      - '${PORT:-3000}:3000'
    # ----- Hardening de runtime -----------------------------------------
    # 1) Sin escalada de privilegios (bloquea binarios setuid).
    security_opt:
      - no-new-privileges:true
    # 2) Suelta TODAS las capabilities de Linux (la API no necesita ninguna).
    cap_drop:
      - ALL
    # 3) Filesystem raíz de solo-lectura: el atacante no puede escribir binarios.
    #    /tmp se monta como tmpfs para lo poco que Node pueda necesitar escribir.
    read_only: true
    tmpfs:
      - /tmp
    # 4) Límites de recursos: contención ante fugas / DoS.
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

volumes:
  pgdata:
